# .github/workflows/ci.yml
name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restaurar
        run: dotnet restore
      - name: Compilar
        run: dotnet build --no-restore
      - name: Correr pruebas
        run: dotnet test --no-build
